<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brankas Sandi Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        onyx: '#020202',
                        carbon: '#171717',
                        candyblue: '#B2D5E5'
                    },
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    boxShadow: {
                        'premium-float': '0 12px 30px -5px rgba(255, 255, 255, 0.08)',
                        'premium-hover': '0 20px 40px -5px rgba(255, 255, 255, 0.12)',
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #020202; /* Onyx */
            min-height: 100vh;
        }
        
        /* Custom Scrollbar for premium feel */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #B2D5E5; }

        /* Sembunyikan panah pada input number di beberapa browser */
        input[type="range"] {
            accent-color: #B2D5E5;
        }
    </style>
</head>
<body class="text-gray-300 flex items-center justify-center p-4">

    <div class="bg-carbon rounded-[32px] shadow-2xl p-6 md:p-8 w-full max-w-md max-h-[95vh] overflow-y-auto border border-gray-800/50">
        
        <h1 class="text-2xl font-semibold text-center mb-1 text-white tracking-wide">
            Brankas Pribadi
        </h1>
        <p class="text-center text-[10px] text-gray-500 mb-8 uppercase tracking-widest">AES-256 Offline Encrypted</p>

        <div class="mb-6 bg-onyx rounded-3xl p-4 border border-gray-800/50">
            <label class="block text-xs font-medium mb-3 text-gray-400 pl-2">Master Password</label>
            <div class="flex gap-3">
                <input type="password" id="masterPassword" class="w-full bg-carbon border border-gray-800 rounded-full px-5 py-3 text-white text-sm focus:outline-none focus:border-candyblue transition-colors" placeholder="Kunci Enkripsi Anda...">
                
                <button onclick="uiCekBiometrik()" class="bg-carbon border border-gray-800 hover:border-candyblue hover:text-candyblue text-gray-400 p-3 rounded-full transition-all duration-300 flex items-center justify-center aspect-square" title="Gunakan Biometrik">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
                    </svg>
                </button>
            </div>
        </div>

        <div class="flex gap-3 mb-6 bg-onyx p-1.5 rounded-full border border-gray-800/50">
            <button onclick="setMode('sandi')" id="btnSandi" class="w-1/2 bg-candyblue text-onyx font-semibold py-2.5 rounded-full text-sm transition-all shadow-premium-float">Mode Sandi</button>
            <button onclick="setMode('pin')" id="btnPin" class="w-1/2 text-gray-400 hover:text-white font-medium py-2.5 rounded-full text-sm transition-all">Mode PIN</button>
        </div>

        <div class="mb-6">
            <div class="mb-4 flex justify-between items-center pl-2">
                <label class="text-xs text-gray-400">Panjang Karakter:</label>
                <span id="lenDisplay" class="font-semibold text-candyblue text-sm">16</span>
            </div>
            <input type="range" id="pwLength" min="4" max="64" value="16" class="w-full mb-5" oninput="document.getElementById('lenDisplay').innerText = this.value">

            <div id="opsiSandi" class="grid grid-cols-2 gap-3 text-xs text-gray-300">
                <label class="flex items-center gap-3 bg-onyx p-3 rounded-2xl border border-gray-800/50 cursor-pointer hover:border-gray-700 transition"><input type="checkbox" id="chkUpper" checked> A-Z (Kapital)</label>
                <label class="flex items-center gap-3 bg-onyx p-3 rounded-2xl border border-gray-800/50 cursor-pointer hover:border-gray-700 transition"><input type="checkbox" id="chkLower" checked> a-z (Kecil)</label>
                <label class="flex items-center gap-3 bg-onyx p-3 rounded-2xl border border-gray-800/50 cursor-pointer hover:border-gray-700 transition"><input type="checkbox" id="chkNum" checked> 0-9 (Angka)</label>
                <label class="flex items-center gap-3 bg-onyx p-3 rounded-2xl border border-gray-800/50 cursor-pointer hover:border-gray-700 transition"><input type="checkbox" id="chkSym" checked> !@#$% (Simbol)</label>
            </div>
        </div>

        <div class="mb-8 relative">
            <input type="text" id="hasilGenerate" class="w-full bg-onyx border border-gray-800 rounded-3xl p-5 pb-16 text-white text-center font-mono tracking-widest text-lg focus:outline-none" readonly placeholder="••••••••">
            
            <div class="absolute bottom-2 left-2 right-2">
                <button onclick="uiGenerate()" class="w-full bg-carbon text-white text-xs uppercase tracking-wider font-semibold py-3 rounded-full hover:bg-gray-800 transition duration-300 border border-gray-700">
                    Acak Sandi Baru
                </button>
            </div>
        </div>

        <div class="mb-6">
            <label class="block text-xs font-medium mb-3 text-gray-400 pl-2">Simpan Akun Baru</label>
            <input type="text" id="namaAkun" class="w-full bg-onyx border border-gray-800 rounded-full px-5 py-3 text-white text-sm focus:outline-none focus:border-candyblue mb-4 transition-colors" placeholder="Nama Akun (Misal: Gmail, BCA)">
            
            <button onclick="uiSimpan()" class="w-full bg-candyblue text-onyx font-semibold py-3.5 px-4 rounded-full shadow-premium-float hover:shadow-premium-hover transform hover:-translate-y-1 transition-all duration-300">
                Simpan ke Brankas
            </button>
        </div>

        <hr class="border-gray-800 my-8">

        <div>
            <label class="block text-xs font-medium mb-3 text-gray-400 pl-2">Buka Brankas</label>
            <input type="text" id="cariAkun" class="w-full bg-onyx border border-gray-800 rounded-full px-5 py-3 text-white text-sm focus:outline-none focus:border-candyblue mb-4 transition-colors" placeholder="Masukkan Nama Akun...">
            
            <button onclick="uiAmbil()" class="w-full bg-carbon border border-gray-700 text-white hover:border-candyblue hover:text-candyblue font-medium py-3.5 px-4 rounded-full transition-all duration-300">
                Tampilkan Sandi
            </button>

            <div id="hasilPencarian" class="hidden w-full bg-onyx border border-candyblue/50 rounded-2xl p-4 text-center text-candyblue font-mono tracking-widest break-all mt-4 text-lg">
            </div>
        </div>

    </div>

    <script>
        let modeAktif = 'sandi'; 

        // --- MANAJEMEN UI ---
        function setMode(mode) {
            modeAktif = mode;
            const btnSandi = document.getElementById('btnSandi');
            const btnPin = document.getElementById('btnPin');
            const opsiSandi = document.getElementById('opsiSandi');
            const pwLength = document.getElementById('pwLength');
            const lenDisplay = document.getElementById('lenDisplay');

            // Style class for Active/Inactive Tab
            const activeClass = "w-1/2 bg-candyblue text-onyx font-semibold py-2.5 rounded-full text-sm transition-all shadow-premium-float";
            const inactiveClass = "w-1/2 text-gray-400 hover:text-white font-medium py-2.5 rounded-full text-sm transition-all";

            if(mode === 'sandi') {
                btnSandi.className = activeClass;
                btnPin.className = inactiveClass;
                opsiSandi.classList.remove('hidden');
                pwLength.min = 8;
                pwLength.max = 64;
                pwLength.value = 16;
                lenDisplay.innerText = "16";
            } else {
                btnSandi.className = inactiveClass;
                btnPin.className = activeClass;
                opsiSandi.classList.add('hidden');
                pwLength.min = 4;
                pwLength.max = 8;
                pwLength.value = 6;
                lenDisplay.innerText = "6";
            }
        }

        // --- ALGORITMA GENERATOR CSPRNG ---
        function generatePasswordCSP(length, upper, lower, num, sym) {
            let charset = "";
            if(upper) charset += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            if(lower) charset += "abcdefghijklmnopqrstuvwxyz";
            if(num) charset += "0123456789";
            if(sym) charset += "!@#$%^&*?";

            if(charset === "") return "Pilih minimal 1 opsi!";

            let password = "";
            const randomValues = new Uint32Array(length);
            window.crypto.getRandomValues(randomValues);
            for (let i = 0; i < length; i++) password += charset[randomValues[i] % charset.length];
            return password;
        }

        function generatePINCSP(length) {
            const polaVisualGaris = ["2580", "0852", "1470", "0741", "369", "963"];
            const polaSudut = ["1397", "7931", "1739", "9371"];
            const polaBerurutan = ["1234", "2345", "3456", "4567", "5678", "6789", "0123", "9876", "8765", "7654", "6543", "5432", "4321", "3210"];
            
            while(true) {
                let pin = "";
                const randomValues = new Uint32Array(length);
                window.crypto.getRandomValues(randomValues);
                for (let i = 0; i < length; i++) pin += (randomValues[i] % 10).toString();
                if (/^(\d)\1+$/.test(pin)) continue;
                if (/^(\d\d)\1+$/.test(pin) || /^(\d)\1(\d)\2$/.test(pin)) continue;
                if ([...polaVisualGaris, ...polaSudut, ...polaBerurutan].some(pola => pin.includes(pola))) continue;
                return pin; 
            }
        }

        // --- PENGHUBUNG UI ---
        function uiGenerate() {
            const len = parseInt(document.getElementById('pwLength').value);
            let hasil = "";
            if (modeAktif === 'sandi') {
                const up = document.getElementById('chkUpper').checked;
                const low = document.getElementById('chkLower').checked;
                const num = document.getElementById('chkNum').checked;
                const sym = document.getElementById('chkSym').checked;
                hasil = generatePasswordCSP(len, up, low, num, sym);
            } else {
                hasil = generatePINCSP(len);
            }
            document.getElementById('hasilGenerate').value = hasil;
        }

        function uiSimpan() {
            const master = document.getElementById('masterPassword').value;
            const data = document.getElementById('hasilGenerate').value;
            const akun = document.getElementById('namaAkun').value.trim().toLowerCase();

            if (!master) return alert("Master Password wajib diisi!");
            if (!data) return alert("Buat sandi/PIN terlebih dahulu!");
            if (!akun) return alert("Masukkan nama akun!");

            const teksTerenkripsi = CryptoJS.AES.encrypt(data, master).toString();
            localStorage.setItem("br_" + akun, teksTerenkripsi);
            
            alert(`Sandi untuk ${akun} berhasil diamankan!`);
            document.getElementById('namaAkun').value = '';
            document.getElementById('hasilGenerate').value = '';
        }

        function uiAmbil() {
            const master = document.getElementById('masterPassword').value;
            const akun = document.getElementById('cariAkun').value.trim().toLowerCase();
            const box = document.getElementById('hasilPencarian');

            if (!master || !akun) return alert("Isi Master Password dan Nama Akun!");

            const encrypted = localStorage.getItem("br_" + akun);
            if (!encrypted) {
                tampilPesan(box, "Akun tidak ditemukan!", false);
                return;
            }

            try {
                const bytes = CryptoJS.AES.decrypt(encrypted, master);
                const asli = bytes.toString(CryptoJS.enc.Utf8);
                if(!asli) throw new Error();
                tampilPesan(box, asli, true);
            } catch (e) {
                tampilPesan(box, "Akses Ditolak: Master Password Salah!", false);
            }
        }

        function tampilPesan(elemen, teks, sukses) {
            elemen.classList.remove('hidden');
            if (sukses) {
                elemen.className = "w-full bg-onyx border border-candyblue/50 rounded-2xl p-4 text-center text-candyblue font-mono tracking-widest break-all mt-4 text-lg";
            } else {
                elemen.className = "w-full bg-red-950/30 border border-red-900 rounded-2xl p-4 text-center text-red-500 text-sm mt-4";
            }
            elemen.innerText = teks;
        }

        async function uiCekBiometrik() {
            if (!window.PublicKeyCredential) {
                alert("Perangkat tidak mendukung biometrik browser.");
                return;
            }
            try {
                const challenge = new Uint8Array(32);
                window.crypto.getRandomValues(challenge);
                const assertion = await navigator.credentials.get({
                    publicKey: { challenge: challenge, timeout: 60000, userVerification: "required" }
                });
                if (assertion) alert("Autentikasi Biometrik berhasil dilewati.");
            } catch (error) {
                console.log(error);
            }
        }
    </script>
</body>
</html>
