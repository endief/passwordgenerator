<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brankas Sandi Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        onyx: '#020202',
                        carbon: '#171717',
                        candyblue: '#B2D5E5'
                    },
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    boxShadow: {
                        'premium-float': '0 12px 30px -5px rgba(255, 255, 255, 0.08)',
                        'premium-hover': '0 20px 40px -5px rgba(255, 255, 255, 0.12)',
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #020202; /* Onyx */
            min-height: 100vh;
        }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #B2D5E5; }
        input[type="range"] { accent-color: #B2D5E5; }

        /* ======================================================= */
        /* ========== KODE ANIMASI DARI PENGGUNA ================= */
        /* ======================================================= */
        .premium-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(15,23,42,0.4); backdrop-filter: blur(6px);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; opacity: 0; visibility: hidden; transition: 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .premium-overlay.show { opacity: 1; visibility: visible; }

        .premium-card {
            background: white; border-radius: 32px; padding: 40px 30px;
            box-shadow: 0 24px 48px rgba(0,0,0,0.15); text-align: center;
            width: 90%; max-width: 320px; 
            transform: scale(0.9) translateY(15px); 
            transition: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); 
        }
        .premium-overlay.show .premium-card { transform: scale(1) translateY(0); }

        .p-icon-container {
            position: relative; width: 80px; height: 80px; margin: 0 auto 20px auto;
            display: flex; justify-content: center; align-items: center;
        }

        .p-circle {
            position: absolute; width: 64px; height: 64px; border-radius: 50%;
            background: #0F2D5C; top: 50%; left: 50%; margin: -32px 0 0 -32px;
            transform: scale(0); opacity: 0;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.5s ease;
            z-index: 1;
        }
        .is-finished .p-circle { transform: scale(1); opacity: 1; }

        .is-success .p-circle { background: #10b981; } 
        .is-error .p-circle { background: #ef4444; }   
        .is-loading .p-circle { background: #0F2D5C; transform: scale(1); opacity: 1; animation: p-pulse 1.5s infinite; } 

        @keyframes p-pulse { 0% { transform: scale(0.9); } 50% { transform: scale(1); } 100% { transform: scale(0.9); } }

        .p-svg {
            position: absolute; width: 32px; height: 32px; top: 50%; left: 50%; margin: -16px 0 0 -16px;
            fill: none; stroke: white; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round;
            stroke-dasharray: 100; stroke-dashoffset: 100; z-index: 2;
        }
        .is-finished .p-svg { animation: p-draw 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 0.2s; }
        @keyframes p-draw { to { stroke-dashoffset: 0; } }

        .p-ripple {
            position: absolute; width: 64px; height: 64px; border-radius: 50%;
            border: 2px solid transparent; top: 50%; left: 50%; margin: -32px 0 0 -32px;
            transform: scale(1); opacity: 0; z-index: 0;
        }
        .is-success .p-ripple { border-color: #10b981; animation: p-rip 1s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.3s; }
        .is-error .p-ripple { border-color: #ef4444; animation: p-rip 1s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.3s; }
        @keyframes p-rip { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(2.2); opacity: 0; } }

        .is-finished .p-icon-container { animation: p-bounce-soft 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s; }
        @keyframes p-bounce-soft { 0% { transform: scale(1); } 40% { transform: scale(1.15); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="text-gray-300 flex items-center justify-center p-4">

    <div class="bg-carbon rounded-[32px] shadow-2xl p-6 md:p-8 w-full max-w-md max-h-[95vh] overflow-y-auto border border-gray-800/50">
        
        <h1 class="text-2xl font-semibold text-center mb-1 text-white tracking-wide">
            Brankas Pribadi
        </h1>
        <p class="text-center text-[10px] text-gray-500 mb-8 uppercase tracking-widest">AES-256 Offline Encrypted</p>

        <div class="mb-6 bg-onyx rounded-3xl p-4 border border-gray-800/50">
            <label class="block text-xs font-medium mb-3 text-gray-400 pl-2">Master Password</label>
            <div class="flex gap-3">
                <input type="password" id="masterPassword" class="w-full bg-carbon border border-gray-800 rounded-full px-5 py-3 text-white text-sm focus:outline-none focus:border-candyblue transition-colors" placeholder="Kunci Enkripsi Anda...">
                
                <button onclick="uiCekBiometrik()" class="bg-carbon border border-gray-800 hover:border-candyblue hover:text-candyblue text-gray-400 p-3 rounded-full transition-all duration-300 flex items-center justify-center aspect-square" title="Gunakan Biometrik">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
                    </svg>
                </button>
            </div>
        </div>

        <div class="flex gap-3 mb-6 bg-onyx p-1.5 rounded-full border border-gray-800/50">
            <button onclick="setMode('sandi')" id="btnSandi" class="w-1/2 bg-candyblue text-onyx font-semibold py-2.5 rounded-full text-sm transition-all shadow-premium-float">Mode Sandi</button>
            <button onclick="setMode('pin')" id="btnPin" class="w-1/2 text-gray-400 hover:text-white font-medium py-2.5 rounded-full text-sm transition-all">Mode PIN</button>
        </div>

        <div class="mb-6">
            <div class="mb-4 flex justify-between items-center pl-2">
                <label class="text-xs text-gray-400">Panjang Karakter:</label>
                <span id="lenDisplay" class="font-semibold text-candyblue text-sm">16</span>
            </div>
            <input type="range" id="pwLength" min="4" max="64" value="16" class="w-full mb-5" oninput="document.getElementById('lenDisplay').innerText = this.value">

            <div id="opsiSandi" class="grid grid-cols-2 gap-3 text-xs text-gray-300">
                <label class="flex items-center gap-3 bg-onyx p-3 rounded-2xl border border-gray-800/50 cursor-pointer hover:border-gray-700 transition"><input type="checkbox" id="chkUpper" checked> A-Z (Kapital)</label>
                <label class="flex items-center gap-3 bg-onyx p-3 rounded-2xl border border-gray-800/50 cursor-pointer hover:border-gray-700 transition"><input type="checkbox" id="chkLower" checked> a-z (Kecil)</label>
                <label class="flex items-center gap-3 bg-onyx p-3 rounded-2xl border border-gray-800/50 cursor-pointer hover:border-gray-700 transition"><input type="checkbox" id="chkNum" checked> 0-9 (Angka)</label>
                <label class="flex items-center gap-3 bg-onyx p-3 rounded-2xl border border-gray-800/50 cursor-pointer hover:border-gray-700 transition"><input type="checkbox" id="chkSym" checked> !@#$% (Simbol)</label>
            </div>
        </div>

        <div class="mb-8 relative">
            <input type="text" id="hasilGenerate" class="w-full bg-onyx border border-gray-800 rounded-3xl p-5 pb-16 text-white text-center font-mono tracking-widest text-lg focus:outline-none" readonly placeholder="••••••••">
            
            <div class="absolute bottom-2 left-2 right-2">
                <button onclick="uiGenerate()" class="w-full bg-carbon text-white text-xs uppercase tracking-wider font-semibold py-3 rounded-full hover:bg-gray-800 transition duration-300 border border-gray-700">
                    Acak Sandi Baru
                </button>
            </div>
        </div>

        <div class="mb-6">
            <label class="block text-xs font-medium mb-3 text-gray-400 pl-2">Simpan Akun Baru</label>
            <input type="text" id="namaAkun" class="w-full bg-onyx border border-gray-800 rounded-full px-5 py-3 text-white text-sm focus:outline-none focus:border-candyblue mb-4 transition-colors" placeholder="Nama Akun (Misal: Gmail, BCA)">
            
            <button onclick="uiSimpan()" class="w-full bg-candyblue text-onyx font-semibold py-3.5 px-4 rounded-full shadow-premium-float hover:shadow-premium-hover transform hover:-translate-y-1 transition-all duration-300">
                Simpan ke Brankas
            </button>
        </div>

        <hr class="border-gray-800 my-8">

        <div class="mb-4">
            <label class="block text-xs font-medium mb-3 text-gray-400 pl-2">Isi Brankas Anda</label>
            <p class="text-[10px] text-gray-500 mb-3 pl-2">Tampil berdasarkan Master Password di atas.</p>
            <button onclick="uiBukaBrankas()" class="w-full bg-carbon border border-gray-700 text-white hover:border-candyblue hover:text-candyblue font-medium py-3.5 px-4 rounded-full transition-all duration-300 mb-4 shadow-sm">
                Buka Isi Brankas
            </button>
        </div>

        <div id="passwordContainer" class="space-y-3">
            </div>

    </div>

    <div id="authModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 opacity-0 pointer-events-none transition-all duration-300">
        <div class="bg-carbon border border-gray-800 rounded-3xl p-6 w-[90%] max-w-sm text-center shadow-2xl transform scale-95 transition-transform duration-300" id="authModalBox">
            <h3 class="text-base font-semibold text-white mb-2">Keamanan Berlapis</h3>
            <p class="text-xs text-gray-400 mb-5">Masukkan kembali Master Password Anda untuk konfirmasi.</p>
            
            <input type="password" id="authInput" class="w-full bg-onyx border border-gray-800 rounded-full px-5 py-3 text-white text-sm text-center focus:outline-none focus:border-candyblue mb-5" placeholder="Master Password...">
            
            <div class="flex gap-3">
                <button onclick="closeAuthModal()" class="w-1/2 bg-transparent border border-gray-700 text-gray-400 hover:text-white font-medium py-2.5 rounded-full text-sm transition-all">Batal</button>
                <button onclick="confirmAuthModal()" class="w-1/2 bg-candyblue text-onyx font-semibold py-2.5 rounded-full text-sm transition-all shadow-premium-float">Lanjut</button>
            </div>
        </div>
    </div>

    <div id="premiumAlertOverlay" class="premium-overlay">
        <div class="premium-card">
            <div id="pIconContainer" class="p-icon-container">
                <div class="p-circle"></div>
                <div class="p-ripple"></div>
                <svg id="pSvgSuccess" class="p-svg hidden" viewBox="0 0 24 24">
                    <path d="M4.5 12.75l6 6 9-13.5" />
                </svg>
                <svg id="pSvgError" class="p-svg hidden" viewBox="0 0 24 24">
                    <path d="M6 18L18 6M6 6l12 12" />
                </svg>
            </div>
            <h3 id="premiumAlertTitle" class="text-lg font-bold text-gray-800 mb-1">Status</h3>
            <p id="premiumAlertMsg" class="text-sm text-gray-500 mb-6 font-medium">Detail pesan</p>
            <button onclick="closePremiumAlert()" class="bg-carbon text-white text-xs uppercase tracking-widest font-semibold py-3 px-8 rounded-full shadow-lg transition transform hover:scale-105 hover:bg-gray-900">Tutup</button>
        </div>
    </div>


    <script>
        // --- STATE & VARIABEL ---
        let modeAktif = 'sandi'; 
        let currentLoadedVault = []; 
        let activeMasterHash = null; // Menyimpan hash dari MP yang sedang terbuka brankasnya
        let revealedItems = {}; // Menyimpan status mata terbuka per item id

        // Variabel untuk aksi sensitif (View, Copy, Delete)
        let pendingAction = null; 
        let pendingTargetId = null;

        // --- MANAJEMEN UI GENERATOR ---
        function setMode(mode) {
            modeAktif = mode;
            const btnSandi = document.getElementById('btnSandi');
            const btnPin = document.getElementById('btnPin');
            const opsiSandi = document.getElementById('opsiSandi');
            const pwLength = document.getElementById('pwLength');
            const lenDisplay = document.getElementById('lenDisplay');

            const activeClass = "w-1/2 bg-candyblue text-onyx font-semibold py-2.5 rounded-full text-sm transition-all shadow-premium-float";
            const inactiveClass = "w-1/2 text-gray-400 hover:text-white font-medium py-2.5 rounded-full text-sm transition-all";

            if(mode === 'sandi') {
                btnSandi.className = activeClass;
                btnPin.className = inactiveClass;
                opsiSandi.classList.remove('hidden');
                pwLength.min = 8;
                pwLength.max = 64;
                pwLength.value = 16;
                lenDisplay.innerText = "16";
            } else {
                btnSandi.className = inactiveClass;
                btnPin.className = activeClass;
                opsiSandi.classList.add('hidden');
                pwLength.min = 4;
                pwLength.max = 8;
                pwLength.value = 6;
                lenDisplay.innerText = "6";
            }
        }

        function generatePasswordCSP(length, upper, lower, num, sym) {
            let charset = "";
            if(upper) charset += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            if(lower) charset += "abcdefghijklmnopqrstuvwxyz";
            if(num) charset += "0123456789";
            if(sym) charset += "!@#$%^&*?";
            if(charset === "") return "Pilih minimal 1 opsi!";

            let password = "";
            const randomValues = new Uint32Array(length);
            window.crypto.getRandomValues(randomValues);
            for (let i = 0; i < length; i++) password += charset[randomValues[i] % charset.length];
            return password;
        }

        function generatePINCSP(length) {
            const polaVisual = ["2580", "0852", "1470", "0741", "369", "963", "1397", "7931", "1739", "9371"];
            const polaUrut = ["1234", "2345", "3456", "4567", "5678", "6789", "0123", "9876", "8765", "7654", "6543", "5432", "4321", "3210"];
            
            while(true) {
                let pin = "";
                const randomValues = new Uint32Array(length);
                window.crypto.getRandomValues(randomValues);
                for (let i = 0; i < length; i++) pin += (randomValues[i] % 10).toString();
                if (/^(\d)\1+$/.test(pin)) continue;
                if (/^(\d\d)\1+$/.test(pin) || /^(\d)\1(\d)\2$/.test(pin)) continue;
                if ([...polaVisual, ...polaUrut].some(pola => pin.includes(pola))) continue;
                return pin; 
            }
        }

        function uiGenerate() {
            const len = parseInt(document.getElementById('pwLength').value);
            let hasil = "";
            if (modeAktif === 'sandi') {
                const up = document.getElementById('chkUpper').checked;
                const low = document.getElementById('chkLower').checked;
                const num = document.getElementById('chkNum').checked;
                const sym = document.getElementById('chkSym').checked;
                hasil = generatePasswordCSP(len, up, low, num, sym);
            } else {
                hasil = generatePINCSP(len);
            }
            document.getElementById('hasilGenerate').value = hasil;
        }


        // --- MANAJEMEN BRANKAS & PENYIMPANAN ---
        // Kunci penyimpanan menggunakan SHA256 dari Master Password (dukung banyak MP)
        function getStorageKey(mp) {
            return "vlt_" + CryptoJS.SHA256(mp).toString();
        }

        function uiSimpan() {
            const mp = document.getElementById('masterPassword').value;
            const dataSandi = document.getElementById('hasilGenerate').value;
            const akun = document.getElementById('namaAkun').value.trim();

            if (!mp) return triggerCustomAlert('error', 'Akses Ditolak', 'Isi Master Password di atas terlebih dahulu.');
            if (!dataSandi) return triggerCustomAlert('error', 'Gagal Simpan', 'Silakan acak sandi baru terlebih dahulu.');
            if (!akun) return triggerCustomAlert('error', 'Gagal Simpan', 'Nama akun tidak boleh kosong.');

            const key = getStorageKey(mp);
            let vaultData = [];
            
            // Ambil brankas lama jika ada
            const existingEncrypted = localStorage.getItem(key);
            if(existingEncrypted) {
                try {
                    const bytes = CryptoJS.AES.decrypt(existingEncrypted, mp);
                    const dec = bytes.toString(CryptoJS.enc.Utf8);
                    if(dec) vaultData = JSON.parse(dec);
                } catch(e) {
                    // Jika MP salah saat mendekripsi (seharusnya tidak terjadi karena ini proses simpan, 
                    // tapi dicegah jika ada bug)
                }
            }

            // Tambah item baru
            const newItem = {
                id: 'id_' + Date.now(),
                account: akun,
                ciphertext: CryptoJS.AES.encrypt(dataSandi, mp).toString()
            };
            
            vaultData.push(newItem);
            
            // Enkripsi dan simpan ulang
            localStorage.setItem(key, CryptoJS.AES.encrypt(JSON.stringify(vaultData), mp).toString());
            
            triggerCustomAlert('success', 'Berhasil Disimpan', 'Sandi diamankan ke dalam brankas.');
            
            document.getElementById('namaAkun').value = '';
            document.getElementById('hasilGenerate').value = '';

            // Jika brankas sedang terbuka dengan MP yang sama, perbarui tampilannya
            if(activeMasterHash === key) {
                uiBukaBrankas();
            }
        }

        function uiBukaBrankas() {
            const mp = document.getElementById('masterPassword').value;
            if (!mp) return triggerCustomAlert('error', 'Akses Ditolak', 'Isi Master Password untuk membuka brankas.');

            const key = getStorageKey(mp);
            const existingEncrypted = localStorage.getItem(key);
            
            if(!existingEncrypted) {
                currentLoadedVault = [];
                activeMasterHash = key;
                renderCards();
                return;
            }

            try {
                const bytes = CryptoJS.AES.decrypt(existingEncrypted, mp);
                const dec = bytes.toString(CryptoJS.enc.Utf8);
                if(!dec) throw new Error();
                
                currentLoadedVault = JSON.parse(dec);
                activeMasterHash = key;
                revealedItems = {}; // Reset saat memuat ulang
                renderCards();
            } catch(e) {
                triggerCustomAlert('error', 'Gagal Membuka', 'Master Password salah atau data tidak cocok.');
            }
        }

        function renderCards() {
            const container = document.getElementById('passwordContainer');
            container.innerHTML = "";

            if(currentLoadedVault.length === 0) {
                container.innerHTML = `<p class="text-center text-xs text-gray-600 py-4 bg-onyx rounded-2xl border border-gray-800">Brankas kosong atau belum ada data untuk Master Password ini.</p>`;
                return;
            }

            // Urutkan item berdasarkan id/waktu terbaru di atas (opsional)
            const sortedVault = [...currentLoadedVault].reverse();

            sortedVault.forEach(item => {
                const isRevealed = !!revealedItems[item.id];
                let displayPass = "••••••••••••";
                
                // Dekripsi jika status isRevealed = true
                if(isRevealed) {
                    const mp = document.getElementById('masterPassword').value;
                    try {
                        const bytes = CryptoJS.AES.decrypt(item.ciphertext, mp);
                        displayPass = bytes.toString(CryptoJS.enc.Utf8);
                    } catch(e) { displayPass = "Error"; }
                }

                // Eye Icon (Mata Terbuka/Tertutup)
                const eyeIconPath = isRevealed 
                    ? `<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />`
                    : `<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />`;

                const cardHTML = `
                <div class="bg-onyx border border-gray-800 rounded-2xl p-4 relative flex items-center justify-between mb-3 shadow-sm hover:border-gray-700 transition-colors">
                    
                    <div class="flex-1 pr-14 overflow-hidden">
                        <h4 class="text-white font-semibold text-sm mb-1 truncate">${item.account}</h4>
                        <p class="font-mono text-sm truncate ${isRevealed ? 'text-candyblue' : 'text-gray-500'}">${displayPass}</p>
                    </div>

                    <div class="absolute right-12 top-1/2 transform -translate-y-1/2">
                        <button onclick="requestAction('view', '${item.id}')" class="text-gray-500 hover:text-candyblue p-1 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                                ${eyeIconPath}
                            </svg>
                        </button>
                    </div>

                    <div class="absolute right-3 top-3">
                        <button onclick="toggleDropdown(event, '${item.id}')" class="text-gray-500 hover:text-white p-1 rounded transition-colors focus:outline-none">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5ZM12 12.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5ZM12 18.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5Z" /></svg>
                        </button>
                        
                        <div id="drop-${item.id}" class="hidden absolute right-0 mt-2 w-12 bg-carbon border border-gray-800 rounded-xl shadow-2xl z-20 flex-col overflow-hidden">
                            <button onclick="requestAction('copy', '${item.id}')" class="w-full h-10 flex items-center justify-center text-gray-400 hover:text-candyblue hover:bg-gray-800/50 border-b border-gray-800 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0 0 13.524 2.25h-3.048a2.25 2.25 0 0 0-2.141 1.638l-.154.515a1.859 1.859 0 0 1-2.43 1.177l-.538-.203a2.25 2.25 0 0 0-2.905 1.258l-1.524 3.68a2.25 2.25 0 0 0 1.21 2.923l.537.203a1.859 1.859 0 0 1 1.177 2.43l-.154.515a2.25 2.25 0 0 0 1.638 2.141m12.446-13.3a2.25 2.25 0 0 1 2.141 1.638l.154.515a1.859 1.859 0 0 0 2.43 1.177l.538-.203a2.25 2.25 0 0 1 2.905 1.258l1.524 3.68a2.25 2.25 0 0 1-1.21 2.923l-.537.203a1.859 1.859 0 0 0-1.177 2.43l.154.515a2.25 2.25 0 0 1-1.638 2.141m-2.25-10.5a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0Z" /></svg>
                            </button>
                            <button onclick="requestAction('delete', '${item.id}')" class="w-full h-10 flex items-center justify-center text-gray-400 hover:text-red-500 hover:bg-red-950/20 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.34 9m-4.72 0-.34-9m9.96-3.204a18.103 18.103 0 0 0-2.36-.214M15.75 22.5a2.25 2.25 0 0 1-2.25-2.25V6m3 0V4.5a2.25 2.25 0 0 0-2.25-2.25h-1.5a2.25 2.25 0 0 0-2.25 2.25V6m3 0H9m-1.285 2.052.485 12c.06 1.488 1.277 2.66 2.768 2.66h4.815c1.491 0 2.707-1.172 2.768-2.66l.485-12m-12 0a17.961 17.961 0 0 1 12 0" /></svg>
                            </button>
                        </div>
                    </div>
                </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        // --- SISTEM DROPDOWN TITIK TIGA ---
        function toggleDropdown(e, id) {
            e.stopPropagation();
            const drops = document.querySelectorAll('[id^="drop-"]');
            drops.forEach(d => {
                if(d.id !== 'drop-'+id) d.classList.add('hidden');
            });
            document.getElementById('drop-'+id).classList.toggle('hidden');
        }

        // Tutup dropdown jika klik di luar
        window.addEventListener('click', () => {
            document.querySelectorAll('[id^="drop-"]').forEach(d => d.classList.add('hidden'));
        });


        // --- LOGIKA AKSI SENSITIF & VERIFIKASI MASTER PASSWORD ---
        function requestAction(actionType, itemId) {
            // Tutup dropdown terlebih dahulu
            document.querySelectorAll('[id^="drop-"]').forEach(d => d.classList.add('hidden'));

            // Kasus khusus 1: Klik view pada item yang sudah terbuka (Tutup tanpa modal)
            if(actionType === 'view' && revealedItems[itemId]) {
                delete revealedItems[itemId];
                renderCards();
                return;
            }

            // Kasus khusus 2: Klik copy pada item yang sudah terbuka matanya (Copy langsung tanpa modal)
            if(actionType === 'copy' && revealedItems[itemId]) {
                executeAction('copy', itemId);
                return;
            }

            // Aksi lain wajib modal verifikasi
            pendingAction = actionType;
            pendingTargetId = itemId;

            const modal = document.getElementById('authModal');
            const modalBox = document.getElementById('authModalBox');
            
            modal.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => modalBox.classList.remove('scale-95'), 10);
            
            document.getElementById('authInput').value = "";
            document.getElementById('authInput').focus();
        }

        function closeAuthModal() {
            const modal = document.getElementById('authModal');
            const modalBox = document.getElementById('authModalBox');
            
            modalBox.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('opacity-0', 'pointer-events-none');
            }, 200);
            
            pendingAction = null;
            pendingTargetId = null;
        }

        function confirmAuthModal() {
            const inputVal = document.getElementById('authInput').value;
            // Validasi dengan Master Password di kolom utama paling atas
            const realMasterPass = document.getElementById('masterPassword').value;

            if(!realMasterPass || inputVal !== realMasterPass) {
                closeAuthModal();
                setTimeout(() => triggerCustomAlert('error', 'Verifikasi Gagal', 'Sandi verifikasi salah atau Master utama kosong.'), 250);
                return;
            }

            // Sukses
            const act = pendingAction;
            const tid = pendingTargetId;
            closeAuthModal();
            setTimeout(() => executeAction(act, tid), 250);
        }

        function executeAction(actionType, itemId) {
            const mp = document.getElementById('masterPassword').value;
            const targetItem = currentLoadedVault.find(i => i.id === itemId);
            if(!targetItem) return;

            let plainPass = "";
            try {
                const bytes = CryptoJS.AES.decrypt(targetItem.ciphertext, mp);
                plainPass = bytes.toString(CryptoJS.enc.Utf8);
            } catch(e) { return triggerCustomAlert('error', 'Error Sistem', 'Data rusak atau sandi salah.'); }

            if(actionType === 'view') {
                revealedItems[itemId] = true;
                renderCards();
            } 
            else if(actionType === 'copy') {
                navigator.clipboard.writeText(plainPass).then(() => {
                    triggerCustomAlert('success', 'Berhasil Disalin', 'Password disalin ke clipboard.');
                });
            } 
            else if(actionType === 'delete') {
                // Hapus item dari array
                currentLoadedVault = currentLoadedVault.filter(i => i.id !== itemId);
                if(revealedItems[itemId]) delete revealedItems[itemId];
                
                // Simpan ke storage
                const key = getStorageKey(mp);
                localStorage.setItem(key, CryptoJS.AES.encrypt(JSON.stringify(currentLoadedVault), mp).toString());
                
                renderCards();
                triggerCustomAlert('success', 'Dihapus', 'Password telah dihapus dari brankas.');
            }
        }


        // --- MANAJEMEN ANIMASI CUSTOM (DARI PENGGUNA) ---
        function triggerCustomAlert(status, title, message) {
            const overlay = document.getElementById('premiumAlertOverlay');
            const container = document.getElementById('pIconContainer');
            const svgSuccess = document.getElementById('pSvgSuccess');
            const svgError = document.getElementById('pSvgError');

            // Reset
            container.className = "p-icon-container";
            svgSuccess.classList.add('hidden');
            svgError.classList.add('hidden');

            if(status === 'success') {
                container.classList.add('is-success', 'is-finished');
                svgSuccess.classList.remove('hidden');
            } else {
                container.classList.add('is-error', 'is-finished');
                svgError.classList.remove('hidden');
            }

            document.getElementById('premiumAlertTitle').innerText = title;
            document.getElementById('premiumAlertMsg').innerText = message;
            
            overlay.classList.add('show');
        }

        function closePremiumAlert() {
            document.getElementById('premiumAlertOverlay').classList.remove('show');
        }

        // Biometrik Pemanis (Abaikan jika tidak ada hardware)
        async function uiCekBiometrik() {
            if (!window.PublicKeyCredential) return alert("Perangkat tidak mendukung biometrik browser.");
            try {
                const challenge = new Uint8Array(32);
                window.crypto.getRandomValues(challenge);
                const assertion = await navigator.credentials.get({
                    publicKey: { challenge: challenge, timeout: 60000, userVerification: "required" }
                });
                if (assertion) triggerCustomAlert('success', 'Biometrik Sukses', 'Namun Anda tetap perlu mengisi Master Password untuk dekripsi data AES.');
            } catch (error) { console.log(error); }
        }
    </script>
